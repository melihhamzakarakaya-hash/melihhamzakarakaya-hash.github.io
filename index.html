<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İlk Web Sitem</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1b26; /* Kod yazanların sevdiği dark tema */
            color: #a9b1d6;
            text-align: center;
            padding-top: 100px;
        }
        .kutu {
            background-color: #24283b;
            padding: 40px;
            border-radius: 15px;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        h1 { color: #7aa2f7; }
        button {
            background-color: #bb9af7;
            color: #1a1b26;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
            transition: 0.3s;
        }
        button:hover { background-color: #9d7cd8; }
    </style>
</head>
<body>

    <div class="kutu">
        <h1>Selamlar! 🚀</h1>
        <p>Bu site an itibarıyla tüm dünyaya açık durumda.</p>
        <button onclick="alert('Sistem tıkır tıkır çalışıyor kankam!')">Test Et</button>
    </div>

</body>
</html>
