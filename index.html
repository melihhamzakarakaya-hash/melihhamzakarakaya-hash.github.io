<!DOCTYPE html>
<html lang="tr">
<head>
  
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Java Entegreli Sitem</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1b26;
            color: #a9b1d6;
            text-align: center;
            padding-top: 100px;
        }
        .kutu {
            background-color: #24283b;
            padding: 40px;
            border-radius: 15px;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        h1 { color: #7aa2f7; }
        
        button {
            background-color: #bb9af7;
            color: #1a1b26;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
            transition: 0.3s;
        }
        button:hover { background-color: #9d7cd8; }
        #sonuc { margin-top: 20px; font-weight: bold; color: #9ece6a; }
        
    </style>
    <link rel="stylesheet" href="style.css?v=2">
</head>
<body>

    <div class="kutu">
        
        <h1>Sistem Kontrolü 🚀</h1>
        <p>Aşağıdaki butona bastığında JavaScript gidip Java sunucundan veri çekecek.</p>
        
        <button onclick="javaVerisiniCek()">Java'ya İstek At</button>
        
        <div id="sonuc"></div>
    </div>
    <div class="form-alani">
         <h1>kuaför ömerden randevu al </h1>
    <input type="text" id="musteriAd" placeholder="Adınız Soyadınız">
    
    <select id="islemTuru">
        <option value="" disabled selected>Yapılacak İşlemi Seçin</option>
        <option value="Sac Kesimi">Sadece Saç Kesimi</option>
        <option value="Sakal Kesimi">Sadece Sakal Kesimi</option>
        <option value="Sac Sakal">Saç + Sakal Kesimi</option>
    </select>

    <input type="date" id="randevuTarih">
    <input type="time" id="randevuSaat">
    <button > Randevu al</button> 
</div>  

    <script>
        async function javaVerisiniCek() {
            const sonucDiv = document.getElementById('sonuc');
            sonucDiv.innerText = "İstek gönderiliyor...";

            try {
                // Java sunucumuz yerelde çalıştığı için localhost adresine JavaScript 'fetch' atıyoruz
                const response = await fetch('https://randevu-backend-a7yd.onrender.com/api/mesaj');
                
                // Gelen veriyi JSON formatına çeviriyoruz
                const data = await response.json();
                
                // Ekrana Java'dan gelen içeriği basıyoruz
                sonucDiv.innerText = data.icerik;
            } catch (error) {
                sonucDiv.style.color = "#f7768e";
                sonucDiv.innerText = "Hata: Java sunucusu kapalı veya bağlanılamadı!";
                console.error("Bağlantı hatası:", error);
            }
        }
    </script>

</body>
</html>
