         <h1>kuaför ömerden randevu al </h1>
    <input type="text" id="musteriAd" placeholder="Adınız Soyadınız">
    
    <select id="islemTuru">
        <option value="" disabled selected>Yapılacak İşlemi Seçin</option>
        <option value="Sac Kesimi">Sadece Saç Kesimi</option>
        <option value="Sakal Kesimi">Sadece Sakal Kesimi</option>
        <option value="Sac Sakal">Saç + Sakal Kesimi</option>
    </select>

    <input type="date" id="randevuTarih">
    <input type="time" id="randevuSaat">
    <button onclick="randevuKaydet()"> Randevu al</button>

<script>
// Altın sarısı butonuna tıklandığında çalışacak fonksiyon
document.getElementById("randevuButon").addEventListener("click", function() {
    
    // 1. Kutulardaki bilgileri JavaScript değişkenlerine alıyoruz
    const musteriAd = document.getElementById("musteriAd").value;
    const islemTuru = document.getElementById("islemTuru").value;
    const randevuTarih = document.getElementById("randevuTarih").value;
    const randevuSaat = document.getElementById("randevuSaat").value;

    // Ufak bir kontrol: Boş alan bırakılmasın
    if(!musteriAd || !islemTuru || !randevuTarih || !randevuSaat) {
        alert("Lütfen tüm alanları doldurun kral!");
        return;
    }

    // 2. Java'nın (Randevu.java) anlayacağı isimlerle bir paket (JSON) oluşturuyoruz
    const randevuPaketi = {
        musteriAd: musteriAd,
        islemTuru: islemTuru,
        randevuTarih: randevuTarih,
        randevuSaat: randevuSaat
    };

    // 3. Paketi Java arka planına (API) fırlatıyoruz (FETCH)
    // Bilgisayarda test ederken: http://localhost:8080/api/randevu-olustur
    fetch("http://localhost:8080/api/randevu-olustur", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(randevuPaketi) // Paketi yazı diline çevirip yolluyoruz
    })
    .then(response => response.json())
    .then(data => {
        // Java'dan gelen cevabı ekrana basıyoruz
        if(data.durum === "Basarili") {
            alert(data.mesaj); // "Randevunuz veritabanına başarıyla kaydedildi kral!" yazar
            
            // Formu temizle
            document.getElementById("musteriAd").value = "";
            document.getElementById("islemTuru").value = "";
            document.getElementById("randevuTarih").value = "";
            document.getElementById("randevuSaat").value = "";
        } else {
            alert("Bir hata oluştu kankam.");
        }
    })
    .catch(error => {
        console.error("Hata:", error);
        alert("Arka plan sunucusuna bağlanılamadı!");
    });
});
